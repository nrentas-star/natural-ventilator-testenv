<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Natural Ventilator Selector &#8212; Stack Effect</title>
  <meta name="app-version" content="2.1.4">
  <meta name="app-updated" content="2026-05-27">
  <!-- version: v99 -->
  <style>
:root{--bg:#ffffff;--card:#ffffff;--surface:#f6f8fb;--surface2:#ffffff;--muted:#5b6b7f;--text:#0f1b2d;--accent:#00589a;--accent2:#58b0e3;--good:#2e7d32;--warn:#b26a00;--bad:#c62828;--border:#d6dde8;--border2:#c5cfdd;--shadow:0 10px 28px rgba(15,27,45,.10)}
    html,body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,'Helvetica Neue',Arial;background:var(--bg);color:var(--text);font-size:19px}
    .wrap{max-width:1180px;margin:24px auto;padding:0 16px}
    h1{font-size:clamp(26px,2.8vw,36px);margin:0 0 6px}
 h2{font-size:22px;margin:0 0 8px}
    p.sub{color:var(--muted);margin:0 0 18px;line-height:1.35}
    .grid{display:grid;grid-template-columns:repeat(12,1fr);gap:14px}
    .card{background:var(--card);box-shadow:var(--shadow);border:1px solid var(--border);border-radius:12px;padding:16px}
    .span-12{grid-column:span 12}.span-8{grid-column:span 12}.span-6{grid-column:span 12}.span-4{grid-column:span 12}
    @media(min-width:980px){.span-8{grid-column:span 8}.span-6{grid-column:span 6}.span-4{grid-column:span 4}}
    .row{display:flex;gap:12px;flex-wrap:wrap}
    .field{flex:1 1 180px;min-width:220px}
    label{display:block;font-size:15px;color:var(--muted);margin:4px 0}
    input,select{width:100%;padding:10px 12px;border-radius:10px;background:var(--surface2);color:var(--text);border:1px solid var(--border2);outline:none;font-size:17px}
    input:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,88,154,.18)}
    .actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:12px}
    button{background:var(--accent);color:#ffffff;border:none;border-radius:10px;padding:10px 14px;font-weight:800;cursor:pointer}
    button.secondary{background:var(--surface);color:var(--text);border:1px solid var(--border2)}
    .kpi{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:12px}
    .kpi .item{background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:12px}
    .kpi h3{margin:0 0 4px;font-size:12px;color:var(--muted);font-weight:650}
    .kpi .val{font-size:24px;font-weight:850}
    .small{font-size:15px;color:var(--muted);line-height:1.35}
    .ok{color:var(--good)}.warn{color:var(--warn)}.bad{color:var(--bad)}
    details{background:var(--surface);border:1px dashed var(--border2);padding:12px;border-radius:10px}
    code{background:var(--surface);border:1px solid var(--border2);padding:2px 6px;border-radius:6px}
    table{width:100%;border-collapse:collapse;border:1px solid var(--border2)}
    th,td{padding:8px;border-bottom:1px solid var(--border2);text-align:left;vertical-align:top}
    th{color:var(--text);font-weight:650}
    td.r{text-align:right}
    .pill{display:inline-block;padding:2px 8px;border:1px solid var(--border2);border-radius:999px;font-size:12px;color:var(--text);background:var(--surface)}
    .note{border-left:3px solid var(--accent);padding-left:10px;margin:10px 0}
    /* Segmented toggle for sizing method */
    .seg{display:flex;gap:0;background:var(--surface);border:1px solid var(--border2);border-radius:12px;overflow:hidden}
    .seg .seg-item{flex:1;cursor:pointer;user-select:none}
    .seg .seg-item input{display:none}
    .seg .seg-item span{display:block;padding:10px 10px;text-align:center;font-weight:750;color:var(--text);border-right:1px solid var(--border2)}
    .seg .seg-item:last-child span{border-right:none}
    .seg .seg-item input:checked + span{background:var(--accent);color:#ffffff}
    .seg .seg-item span:hover{filter:brightness(1.05)}
    .subnote{font-weight:650;font-size:0.85em;opacity:.85;margin-left:6px}

    hr{border:none;border-top:1px solid var(--border);margin:14px 0}
    @media print{
      @page{size:Letter;margin:0.5in}
      body{background:#fff;color:#000;-webkit-print-color-adjust:exact;print-color-adjust:exact}
      .wrap{max-width:none;margin:0;padding:0}
      .actions{display:none!important}
      .card{break-inside:avoid;page-break-inside:avoid;background:#fff;border-color:#d0d7e2;color:#000}
      .kpi .item{background:#fff;border-color:#d0d7e2}
      details{background:#fff;border-color:#d0d7e2}
      input,select{border-color:#d0d7e2;color:#000;background:#fff}
    }
  
.brand-logo{height:44px;width:auto;display:block;margin:0 0 8px}

  /* --- Additions for v81 --- */
  .help-btn{margin-left:6px;width:18px;height:18px;border-radius:999px;border:1px solid var(--border2);background:var(--surface2);color:var(--accent);font-weight:850;font-size:12px;line-height:1;display:inline-flex;align-items:center;justify-content:center;padding:0;cursor:pointer}
  .help-btn:hover{filter:brightness(1.05)}
  .help-btn:focus{outline:none;box-shadow:0 0 0 3px rgba(0,88,154,.18)}

  #r_ventLen{font-size:32px;font-weight:900;background:rgba(0,88,154,.10);box-shadow:inset 0 0 0 2px rgba(0,88,154,.18);border-radius:10px;padding:4px 8px;display:inline-block;min-width:84px;text-align:right}

  .toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:rgba(15,27,45,.92);color:#fff;padding:10px 14px;border-radius:12px;font-size:14px;font-weight:650;box-shadow:0 10px 28px rgba(15,27,45,.18);opacity:0;pointer-events:none;transition:opacity .18s ease, transform .18s ease;z-index:9999;max-width:min(92vw,520px);text-align:center}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-6px)}

  @keyframes btnPulse{0%{transform:translateY(0) scale(1)}50%{transform:translateY(-1px) scale(1.02);box-shadow:0 10px 22px rgba(0,88,154,.18)}100%{transform:translateY(0) scale(1)}}
  #calc.btn-pulse{animation:btnPulse .22s ease-out}

  #compareTable th.r, #compareTable td.r{text-align:right}
  
    /* Discrete unit toggle for louver size */
    .unit-toggle{display:inline-flex;gap:0;margin-left:8px;vertical-align:middle}
    .unit-toggle input{display:none}
    .unit-toggle label{padding:4px 8px;font-size:12px;cursor:pointer;color:#ffffff;background:#0f1625;border:1px solid #223553;font-weight:700}
    .unit-toggle label:first-of-type{border-radius:6px 0 0 6px;border-right:none}
    .unit-toggle label:last-of-type{border-radius:0 6px 6px 0}
    .unit-toggle input:checked+label{background:var(--accent);color:#ffffff;border-color:var(--accent)}
    .unit-toggle label:hover{filter:brightness(1.05)}
  </style>
</head>

    <h1>Moffitt Natural Ventilator Selector</h1>
    <p class="sub">Based on ASHRAE Fundamentals Chapter 16 Equation 38</p>
    <p class="appver" style="font-size:11px;color:#9aa4b2;margin-top:2px;letter-spacing:.5px">Version 2.1.4 &middot; updated 2026-05-27</p>

    <div class="grid">
      <div class="card span-6">
        <h2>Inputs</h2>

        <div class="row">
          <div class="field">
            <label>Method</label>
            <div class="seg" role="tablist" aria-label="Method">
              <label class="seg-item"><input type="radio" name="method" value="heat" checked><span>Heat Load Method</span></label>
              <label class="seg-item"><input type="radio" name="method" value="cfm"><span>Airflow Method</span></label>
            </div>
          </div>
        </div>

        <div class="row">
          <div class="field" id="heatField">
            <label>Heat Load (BTU/h)</label>
            <input id="heat" type="text" inputmode="decimal" value="" placeholder=""/>
          </div>
          <div class="field" id="cfmField" style="display:none">
            <label>Airflow (CFM)</label>
            <input id="cfm" type="text" inputmode="decimal" value="" disabled placeholder="auto"/>
          </div>
        </div>

        <div class="row">
          <div class="field">
            <label>Temperature rise, T (°F)
              <button type="button" class="help-btn" aria-label="Temperature rise help" onclick="showTempRiseHelp(event)">?</button>
            </label>
            <input id="dt" type="number" step="1" min="1" value="" placeholder=""/>
          </div>
        </div>

        <input id="te" type="hidden" value="95"/>
        <input id="ti" type="hidden" value=""/>

        <hr/>

        <div class="row">
          <div class="field">
            <label>Building height, H (ft)</label>
            <input id="ht" type="number" step="0.1" value="30"/>
          </div>
          <div class="field" style="display:none">
            <label>Gravity constant (ft/s²)</label>
            <input id="g" type="number" step="0.1" value="32.2"/>
          </div>
        </div>

        <div class="row">
          <div class="field">
            <label>Vent Type</label>
            <div class="seg" role="tablist" aria-label="Vent type">
              <label class="seg-item"><input type="radio" name="ventType" value="MoffittVent" checked><span>MoffittVent</span></label>
              <label class="seg-item"><input type="radio" name="ventType" value="MatrixVent"><span>MatrixVent</span></label>
            </div>
          </div>
        </div>

        <div class="row">
          <div class="field" id="moffittWidthBlock">
            <label>MoffittVent Throat Size (ft)</label>
            <div class="seg" role="tablist" aria-label="MoffittVent throat size">
              <label class="seg-item"><input type="radio" name="moffittWPreset" value="2"><span>2</span></label>
              <label class="seg-item"><input type="radio" name="moffittWPreset" value="4" checked><span>4</span></label>
              <label class="seg-item"><input type="radio" name="moffittWPreset" value="6"><span>6</span></label>
              <label class="seg-item"><input type="radio" name="moffittWPreset" value="8"><span>8</span></label>
              <label class="seg-item"><input type="radio" name="moffittWPreset" value="10"><span>10</span></label>
              <label class="seg-item"><input type="radio" name="moffittWPreset" value="12"><span>12</span></label>
              <label class="seg-item"><input type="radio" name="moffittWPreset" value="15"><span>15</span></label>
            </div>
          </div>
          <div class="field" id="matrixWidthBlock" style="display:none">
            <label>MatrixVent Standard Width (ft)</label>
            <input id="matrixW" type="number" disabled value="10"/>
          </div>
        </div>

        <div class="row">
          <div class="field">
            <label>Vent Quantity</label>
            <div class="seg" role="tablist" aria-label="Vent quantity">
              <label class="seg-item"><input type="radio" name="nexhPreset" value="1" checked><span>1</span></label>
              <label class="seg-item"><input type="radio" name="nexhPreset" value="2"><span>2</span></label>
              <label class="seg-item"><input type="radio" name="nexhPreset" value="3"><span>3</span></label>
              <label class="seg-item"><input type="radio" name="nexhPreset" value="4"><span>4</span></label>
              <label class="seg-item"><input type="radio" name="nexhPreset" value="5"><span>5</span></label>
              <label class="seg-item"><input type="radio" name="nexhPreset" value="custom"><span>Custom</span></label>
            </div>
          </div>
          <div class="field" id="nexhCustomBlock" style="display:none">
            <label>Custom exhaust vents</label>
            <input id="nexhCustom" type="number" step="1" min="1" value="1"/>
          </div>
        </div>

        <hr/>

        <div class="row">
          <div class="field">
            <label>Wall Louver Type</label>
            <div class="seg" role="tablist" aria-label="Wall louver type">
              <label class="seg-item"><input type="radio" name="inletTypeToggle" value="louver" checked><span>90° Wall Louvers</span></label>
              <label class="seg-item"><input type="radio" name="inletTypeToggle" value="louver45"><span>45° Wall Louvers</span></label>
            </div>
          </div>
          <div class="field">
            <label id="louverSizeLabel">Wall Louver Size (ft)</label>
            <input id="louverSize" type="text" value="5 x 8"/>
            <span class="unit-toggle">
              <input type="radio" name="louverUnit" id="luFt" value="ft" checked><label for="luFt">ft</label>
              <input type="radio" name="louverUnit" id="luIn" value="in"><label for="luIn">in</label>
            </span>
          </div>
        </div>

        <div class="actions">
          <button id="calc" type="button">Calculate</button>
          <button id="reset" type="button" class="secondary">Reset</button>
          <button id="exportPdf" type="button" class="secondary" onclick="compute();window.print();">Export PDF</button>
        </div>

        <div class="small" id="msg" style="margin-top:10px"></div>
      </div>

      <div class="card span-6">
        <h2 style="margin:0 0 8px">Results</h2>

        <div class="row" style="margin-top:8px">
          <div class="field" style="flex:1 1 360px;min-width:320px">
            <table>
              <tbody>
                <tr><th>Vent Length (per vent)</th><td class="r" id="r_ventLen"></td></tr>
                <tr><th>Vent Velocity</th><td class="r" id="r_vout"></td></tr>
                <tr><th>Wall Louver Quantity</th><td class="r" id="r_louversNeed"></td></tr>
              <tr><th>Wall Louver Velocity</th><td class="r" id="r_louverVel"></td></tr>
</tbody>
            </table>
          </div>
        </div>

        <div class="actions" style="margin-top:8px">
          <button type="button" class="secondary" id="saveA" onclick="saveDesign('A')">Save as Design A</button>
          <button type="button" class="secondary" id="saveB" onclick="saveDesign('B')">Save as Design B</button>
        </div>

        <div id="compareSection" style="display:none">
          <hr/>
          <h2 style="margin:0 0 8px">Compare 2 designs</h2>
          <div class="actions" style="margin-top:8px">
            <button type="button" class="secondary" id="swapAB" onclick="swapCompare()">Swap A  B</button>
            <button type="button" class="secondary" id="clearCompare" onclick="clearCompare()">Clear</button>
          </div>
          <div class="small" id="compareNote" style="margin-top:8px"></div>
          <div class="row" style="margin-top:10px">
            <div class="field" style="flex:1 1 360px;min-width:320px">
              <table id="compareTable">
                <thead>
                  <tr><th>Item</th><th class="r">Design A</th><th class="r">Design B</th></tr>
                </thead>
                <tbody></tbody>
              </table>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite" aria-atomic="true"></div>

<script>
  const PRESET = { MoffittVent: { cd: 0.38, w: 4 }, MatrixVent: { cd: 0.22, w: 10 } };
  const fmt0 = x => (isFinite(x)? x.toLocaleString(undefined,{maximumFractionDigits:0}):'');

  function showTempRiseHelp(e){ if(e){e.preventDefault(); e.stopPropagation();} alert('Temperature rise is calculated by indoor peak temperature minus outdoor temperature'); }
  function showToast(message, durationMs=2000){
    const el = document.getElementById('toast');
    if(!el) return;
    el.textContent = message;
    el.classList.add('show');
    clearTimeout(window.__toastTimer);
    window.__toastTimer = setTimeout(()=>{ el.classList.remove('show'); }, durationMs);
  }
  function pulseCalcBtn(){
    const b = document.getElementById('calc');
    if(!b) return;
    b.classList.remove('btn-pulse');
    void b.offsetWidth;
    b.classList.add('btn-pulse');
    setTimeout(()=>b.classList.remove('btn-pulse'), 260);
  }

  function parseNum(v){
    if(v===null || v===undefined) return NaN;
    const s = String(v).replace(/,/g,'').trim();
    if(s==='') return NaN;
    const n = parseFloat(s);
    return isFinite(n) ? n : NaN;
  }

  function getMethod(){
    const el = document.querySelector('input[name="method"]:checked');
    return el ? el.value : 'heat';
  }

  function syncMethod(){
    const method = getMethod();
    const heatField = document.getElementById('heatField');
    const cfmField = document.getElementById('cfmField');
    const heat = document.getElementById('heat');
    const cfm = document.getElementById('cfm');

    if(method === 'heat'){
      heatField.style.display = 'block';
      cfmField.style.display = 'none';
      heat.disabled = false;
      cfm.disabled = true;
      cfm.value = '';
    }else{
      heatField.style.display = 'none';
      cfmField.style.display = 'block';
      heat.disabled = true;
      cfm.disabled = false;
      heat.value = '';
    }
  }

  function getVentType(){
    const el = document.querySelector('input[name="ventType"]:checked');
    return el ? el.value : 'MoffittVent';
  }
  function getVentWidth(){
    const vt = getVentType();
    if(vt === 'MatrixVent') return PRESET.MatrixVent.w;
    const el = document.querySelector('input[name="moffittWPreset"]:checked');
    return el ? parseFloat(el.value) : PRESET.MoffittVent.w;
  }
  function syncVentBlocks(){
    const vt = getVentType();
    document.getElementById('moffittWidthBlock').style.display = vt === 'MoffittVent' ? 'block' : 'none';
    document.getElementById('matrixWidthBlock').style.display = vt === 'MatrixVent' ? 'block' : 'none';
  }

  function getNexh(){
    const preset = document.querySelector('input[name="nexhPreset"]:checked');
    if(preset && preset.value === 'custom'){
      return Math.max(1, parseInt(document.getElementById('nexhCustom').value || '1', 10));
    }
    return preset ? Math.max(1, parseInt(preset.value, 10)) : 1;
  }
  function syncNexh(){
    const preset = document.querySelector('input[name="nexhPreset"]:checked');
    document.getElementById('nexhCustomBlock').style.display = (preset && preset.value==='custom') ? 'block' : 'none';
  }

  function getInletType(){
    const el = document.querySelector('input[name="inletTypeToggle"]:checked');
    return el ? el.value : 'louver';
  }

  
  function syncLouverLabel(){
    const u = document.querySelector('input[name="louverUnit"]:checked');
    const lbl = document.getElementById('louverSizeLabel');
    if(lbl) lbl.textContent = 'Wall Louver Size (' + (u && u.value === 'in' ? 'in' : 'ft') + ')';
  }

  function compute(){
    const msg = document.getElementById('msg');
    msg.textContent = '';

    const method = getMethod();
    let Heat = parseNum(document.getElementById('heat').value);
    let CFM = parseNum(document.getElementById('cfm').value);

    const dT = parseFloat(document.getElementById('dt').value);
    if(!isFinite(dT) || !(dT > 0)){
      msg.innerHTML = '<span class="bad">Enter a positive temperature rise (T).</span>';
      return;
    }

    const Te = parseFloat(document.getElementById('te').value) || 95;
    const Ti = Te + dT;
    document.getElementById('ti').value = String(Ti);

    if(method === 'heat'){
      if(!isFinite(Heat) || !(Heat > 0)){
        msg.innerHTML = '<span class="bad">Enter a positive Heat Load (BTU/h).</span>';
        return;
      }
      CFM = Heat / (1.08 * dT);
      if(!isFinite(CFM) || !(CFM > 0)){
        msg.innerHTML = '<span class="bad">Calculated Airflow is invalid. Check Heat Load and T.</span>';
        return;
      }
      document.getElementById('cfm').value = fmt0(Math.round(CFM));
    }else{
      if(!isFinite(CFM) || !(CFM > 0)){
        msg.innerHTML = '<span class="bad">Enter a positive Airflow (CFM).</span>';
        return;
      }
      Heat = 1.08 * CFM * dT;
      document.getElementById('heat').value = fmt0(Math.round(Heat));
    }

    const g = parseFloat(document.getElementById('g').value) || 32.2;
    const H = parseFloat(document.getElementById('ht').value) || 0;
    const h = 0.53 * H;
    if(!(h > 0)){
      msg.innerHTML = '<span class="bad">Building height must be greater than 0.</span>';
      return;
    }

    const TiR = Ti + 459.67;
    const TeR = Te + 459.67;
    const ratio = (TiR - TeR) / TiR;
    if(!(ratio > 0)){
      msg.innerHTML = '<span class="bad">Temperature ratio is invalid (check T).</span>';
      return;
    }

    const vt = getVentType();
    const Cd = (vt === 'MatrixVent') ? PRESET.MatrixVent.cd : PRESET.MoffittVent.cd;

    const sqrtTerm = Math.sqrt(Math.max(0, 2 * g * h * ratio));
    if(!(sqrtTerm > 0)){
      msg.innerHTML = '<span class="bad">Stack term is zero; check inputs.</span>';
      return;
    }

    const Qcfs = CFM / 60.0;
    const S_total = Qcfs / (Cd * sqrtTerm);
    const vOut = CFM / S_total;

    syncVentBlocks();
    const W = getVentWidth();
    syncNexh();
    const N = getNexh();
    const L = (S_total / N) / W;

    const inletType = getInletType();
    // Parse louver size from user input (format: "W x H")
    const louverParts = (document.getElementById('louverSize').value || '5 x 8').split(/[xX]/);
    const louverW = parseFloat(louverParts[0]) || 5;
    const louverH = parseFloat(louverParts[1]) || 8;
    // Check unit toggle: convert inches to feet if needed
    const louverUnit = document.querySelector('input[name="louverUnit"]:checked');
    const louverScale = (louverUnit && louverUnit.value === 'in') ? (1/12) : 1;
    const louverLength = louverW * louverScale;
    const louverWidth = louverH * louverScale;
    const louverCd = (inletType === 'louver45') ? 0.35 : 0.82;
    const effAreaPerLouver = louverLength * louverWidth * louverCd;
    const louvers = Math.ceil((CFM / 500.0) / effAreaPerLouver);
    // Effective Area = Quantity × Length × Width × Coefficient of Discharge
    const totalEffArea = louvers * louverLength * louverWidth * louverCd;
    const vLouver = totalEffArea > 0 ? (CFM / totalEffArea) : NaN;

    document.getElementById('r_ventLen').textContent = `${fmt0(Math.round(L))} ft`;
    document.getElementById('r_vout').textContent = `${fmt0(Math.round(vOut))} fpm`;
    document.getElementById('r_louversNeed').textContent = `${fmt0(louvers)} ea`;
    const __lvEl = document.getElementById('r_louverVel');
    if(__lvEl) __lvEl.textContent = `${fmt0(Math.round(vLouver))} fpm`;
  }

  function resetForm(){
    document.getElementById('heat').value='';
    document.getElementById('cfm').value='';
    document.getElementById('dt').value='';

    document.getElementById('ht').value=30;
    document.getElementById('g').value=32.2;

    document.querySelectorAll('input[name="ventType"]').forEach(el=>{ el.checked = (el.value==='MoffittVent'); });
    document.querySelectorAll('input[name="moffittWPreset"]').forEach(el=>{ el.checked = (el.value==='4'); });

    document.querySelectorAll('input[name="nexhPreset"]').forEach(el=>{ el.checked = (el.value==='1'); });
    document.getElementById('nexhCustom').value=1;

    document.querySelectorAll('input[name="inletTypeToggle"]').forEach(el=>{ el.checked = (el.value==='louver'); });

    document.getElementById('r_ventLen').textContent='';
    document.getElementById('r_vout').textContent='';
    document.getElementById('r_louversNeed').textContent='';
    const __lvEl2 = document.getElementById('r_louverVel');
    if(__lvEl2) __lvEl2.textContent='';
    document.getElementById('msg').textContent='';

    syncVentBlocks();
    syncNexh();
    clearCompare();   // Reset also wipes saved Design A/B comparisons
    syncMethod();
  }

  function setCompareVisible(show){
    const sec = document.getElementById('compareSection');
    if(sec) sec.style.display = show ? 'block' : 'none';
  }
  function snapshot(){
    const getText = (id)=>{ const el=document.getElementById(id); return el ? el.textContent.trim() : ''; };
    const getVal  = (id)=>{ const el=document.getElementById(id); return el ? el.value : ''; };
    return {
      savedAt: new Date().toLocaleString(),
      method: getMethod(),
      heat: getVal('heat'),
      airflow: getVal('cfm'),
      dt: getVal('dt'),
      ventType: getVentType(),
      ventQty: getNexh(),
      ventWidth: getVentWidth(),
      ventLen: getText('r_ventLen'),
      ventVel: getText('r_vout'),
      inletType: getInletType(),
      louverQty: getText('r_louversNeed'),
      louverVel: getText('r_louverVel'),
      louverSize: getVal('louverSize'),
      louverUnit: (document.querySelector('input[name="louverUnit"]:checked')||{}).value || 'ft',
    };
  }

function saveDesign(slot){
    try{ compute(); }catch(e){}
    localStorage.setItem('moffittDesign'+slot, JSON.stringify(snapshot()));
    renderCompare();
    showToast(`Saved Design ${slot}`);
  }
  function loadDesign(slot){
    const raw = localStorage.getItem('moffittDesign'+slot);
    if(!raw) return null;
    try{ return JSON.parse(raw); }catch(e){ return null; }
  }
  function swapCompare(){
    const a = localStorage.getItem('moffittDesignA');
    const b = localStorage.getItem('moffittDesignB');
    if(a!==null) localStorage.setItem('moffittDesignB', a); else localStorage.removeItem('moffittDesignB');
    if(b!==null) localStorage.setItem('moffittDesignA', b); else localStorage.removeItem('moffittDesignA');
    renderCompare();
  }
  function clearCompare(){
    ['A','B'].forEach(k=>localStorage.removeItem('moffittDesign'+k));
    renderCompare();
    setCompareVisible(false);
  }
  function addRow(tbody, label, a, b){
    const tr=document.createElement('tr');
    const td0=document.createElement('td'); td0.textContent=label;
    const td1=document.createElement('td'); td1.className='r'; td1.textContent=a||'';
    const td2=document.createElement('td'); td2.className='r'; td2.textContent=b||'';
    tr.appendChild(td0); tr.appendChild(td1); tr.appendChild(td2);
    tbody.appendChild(tr);
  }
  function renderCompare(){
    const table = document.getElementById('compareTable');
    const note = document.getElementById('compareNote');
    if(!table) return;
    const tbody = table.querySelector('tbody');
    tbody.innerHTML='';
    const A = loadDesign('A');
    const B = loadDesign('B');
    const haveA = !!A, haveB = !!B;
    if(!haveA && !haveB){ setCompareVisible(false); if(note) note.textContent=''; return; }
    setCompareVisible(true);
    if(note) note.textContent = `A saved: ${haveA?A.savedAt:''}  |  B saved: ${haveB?B.savedAt:''}`;

    addRow(tbody, 'Method', haveA?(A.method==='heat'?'Heat Load Method':'Airflow Method'):'', haveB?(B.method==='heat'?'Heat Load Method':'Airflow Method'):'');
    addRow(tbody, 'T (°F)', haveA?A.dt:'', haveB?B.dt:'');
    addRow(tbody, 'Heat Load (BTU/h)', haveA?A.heat:'', haveB?B.heat:'');
    addRow(tbody, 'Airflow (CFM)', haveA?A.airflow:'', haveB?B.airflow:'');
    addRow(tbody, 'Vent Type', haveA?A.ventType:'', haveB?B.ventType:'');
    addRow(tbody, 'Vent Quantity', haveA?String(A.ventQty):'', haveB?String(B.ventQty):'');
    addRow(tbody, 'Vent Width', haveA?`${fmt0(Math.round(A.ventWidth))} ft`:'', haveB?`${fmt0(Math.round(B.ventWidth))} ft`:'');
    addRow(tbody, 'Vent Length (per vent)', haveA?A.ventLen:'', haveB?B.ventLen:'');
    addRow(tbody, 'Vent Velocity', haveA?A.ventVel:'', haveB?B.ventVel:'');
    const fmtInlet = (v)=> v==='louver45'?'45° Wall Louvers': v==='louver'?'90° Wall Louvers': v||'';
    addRow(tbody, 'Wall Louver Type', haveA?fmtInlet(A.inletType):'', haveB?fmtInlet(B.inletType):'');
    addRow(tbody, 'Wall Louver Quantity', haveA?String(A.louverQty).replace(/\s*ea\s*$/i,'').trim():'' , haveB?String(B.louverQty).replace(/\s*ea\s*$/i,'').trim():'');
    const fmtSize = (s, unit)=>{ unit = unit || 'ft'; if(!s) return ''; const cleaned=String(s).trim().replace(//g,'x'); const parts=cleaned.split(/x/i).map(p=>p.trim()).filter(Boolean); if(parts.length>=2) return `${parts[0]}${unit} x ${parts[1]}${unit}`; return cleaned; };
    addRow(tbody, 'Wall Louver Size', haveA?fmtSize(A.louverSize, A.louverUnit):'', haveB?fmtSize(B.louverSize, B.louverUnit):'');
    addRow(tbody, 'Wall Louver Velocity', haveA?A.louverVel:'', haveB?B.louverVel:'');
  }

  document.addEventListener('DOMContentLoaded', ()=>{
    const heatEl = document.getElementById('heat');
    const cfmEl = document.getElementById('cfm');
    heatEl.addEventListener('blur', ()=>{ const n=parseNum(heatEl.value); heatEl.value = isFinite(n)?fmt0(Math.round(n)):''; });
    cfmEl.addEventListener('blur', ()=>{ const n=parseNum(cfmEl.value); cfmEl.value = isFinite(n)?fmt0(Math.round(n)):''; });

    document.querySelectorAll('input[name="method"]').forEach(el=>el.addEventListener('change', syncMethod));
    document.querySelectorAll('input[name="ventType"]').forEach(el=>el.addEventListener('change', syncVentBlocks));
    document.querySelectorAll('input[name="nexhPreset"]').forEach(el=>el.addEventListener('change', syncNexh));
    document.getElementById('nexhCustom').addEventListener('input', syncNexh);
    document.querySelectorAll('input[name="louverUnit"]').forEach(el=>el.addEventListener('change', syncLouverLabel));
    syncLouverLabel();

    document.getElementById('calc').addEventListener('click', ()=>{ pulseCalcBtn(); compute(); });
    document.getElementById('reset').addEventListener('click', resetForm);

    document.querySelectorAll('input').forEach(el=>{
      el.addEventListener('keydown', (e)=>{ if(e.key==='Enter'){ pulseCalcBtn(); compute(); } });
    });

    syncVentBlocks();
    syncNexh();
    syncMethod();
    renderCompare();
  });
</script>
